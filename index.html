<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>群組佈告欄</title>
    <!-- 引入 React 與 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- 引入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        notion: {
                            text: '#37352f',
                            gray: '#787774',
                            lightBg: '#f7f7f5',
                            border: '#e9e9e7',
                            link: '#065fd4',
                            red: '#eb5757',
                            redBg: '#ffebe9',
                            yellow: '#eab308'
                        }
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif']
                    },
                    boxShadow: {
                        'dropdown': 'rgba(15, 15, 15, 0.05) 0px 0px 0px 1px, rgba(15, 15, 15, 0.1) 0px 3px 6px, rgba(15, 15, 15, 0.2) 0px 9px 24px',
                        'modal': 'rgba(15, 15, 15, 0.05) 0px 0px 0px 1px, rgba(15, 15, 15, 0.1) 0px 5px 10px, rgba(15, 15, 15, 0.2) 0px 15px 40px'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #ffffff; color: #37352f; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d3d1cb; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #aeaca6; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #d3d1cb; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
        .animate-slide-up { animation: slideUp 0.2s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 🔥 Supabase 直連設定
        // ==========================================
        const SUPA_URL = 'https://neulhlpdrqjzpicvyqyh.supabase.co';
        const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5ldWxobHBkcnFqenBpY3Z5cXloIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwODg0MzIsImV4cCI6MjA4NzY2NDQzMn0.EltDqUsCz06jUtyh_Aq6wQ0vHsocAbpjGwIAmnGP17o';
        const TABLE_NAME = 'line_announcement';
        
        const supaHeaders = {
            'apikey': SUPA_KEY,
            'Authorization': `Bearer ${SUPA_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation'
        };

        // ==========================================
        // UI Icons
        // ==========================================
        const Icons = {
            More: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"/></svg>,
            ArrowLeft: () => <svg className="w-4 h-4 mr-1.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>,
            Close: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"/></svg>
        };

        const formatTextWithLinks = (text) => {
            if (!text) return null;
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const parts = text.split(urlRegex);

            return parts.map((part, index) => {
                if (part.match(urlRegex)) {
                    return (
                        <a key={index} href={part} target="_blank" rel="noopener noreferrer" className="text-notion-link hover:underline break-all" onClick={(e) => e.stopPropagation()}>
                            {part}
                        </a>
                    );
                }
                return <span key={index}>{part.split('\n').map((line, i) => (
                    <React.Fragment key={i}>{line}{i !== part.split('\n').length - 1 && <br />}</React.Fragment>
                ))}</span>;
            });
        };

        // ==========================================
        // 單張佈告欄卡片
        // ==========================================
        const AnnouncementCard = ({ data, onClick, onAction }) => {
            const [isMenuOpen, setIsMenuOpen] = React.useState(false);
            const isText = data.type === 'text';
            const shortDate = data.time.substring(0, 16);
            const isPinned = data.isPinned;

            const handleMenuClick = (e, actionType) => {
                e.stopPropagation();
                setIsMenuOpen(false);
                onAction(actionType, data);
            };

            return (
                <div 
                    onClick={() => onClick(data)}
                    className={`group relative flex flex-col p-4 mb-3 rounded-lg cursor-pointer transition-colors border animate-slide-up
                        ${isPinned ? 'bg-white border-notion-yellow' : 'bg-white border-notion-border hover:bg-notion-lightBg'}
                        ${isMenuOpen ? 'z-30' : 'z-10'}`}
                >
                    {/* 上排：時間、標籤、選單 */}
                    <div className="flex justify-between items-center mb-2">
                        <div className="flex items-center gap-2 flex-wrap">
                            {isPinned && (
                                <span className="text-xs font-medium px-1.5 py-0.5 text-notion-yellow border border-notion-yellow rounded bg-yellow-50/50">
                                    置頂
                                </span>
                            )}
                            <span className="text-xs text-notion-gray">{shortDate}</span>
                            {data.tags && data.tags.map(tag => (
                                <span key={tag} className="text-xs px-1.5 py-0.5 bg-notion-lightBg text-notion-gray rounded border border-notion-border">
                                    {tag}
                                </span>
                            ))}
                        </div>
                        
                        <div className="relative">
                            <button 
                                onClick={(e) => { e.stopPropagation(); setIsMenuOpen(!isMenuOpen); }}
                                className={`p-1 rounded-md transition-colors ${isMenuOpen ? 'bg-gray-200' : 'text-notion-gray hover:bg-gray-200 hover:text-notion-text'}`}
                            >
                                <Icons.More />
                            </button>
                            
                            {isMenuOpen && (
                                <>
                                    <div className="fixed inset-0 z-10 cursor-default" onClick={(e) => { e.stopPropagation(); setIsMenuOpen(false); }}></div>
                                    <div className="absolute right-0 mt-1 w-32 bg-white rounded-md shadow-dropdown border border-notion-border z-20 overflow-hidden py-1">
                                        <button onClick={(e) => handleMenuClick(e, 'edit')} className="w-full text-left px-4 py-2 text-sm text-notion-text hover:bg-notion-lightBg">
                                            編輯內容
                                        </button>
                                        <button onClick={(e) => handleMenuClick(e, 'tag')} className="w-full text-left px-4 py-2 text-sm text-notion-text hover:bg-notion-lightBg">
                                            設定標籤
                                        </button>
                                        <button onClick={(e) => handleMenuClick(e, 'pin')} className="w-full text-left px-4 py-2 text-sm text-notion-text hover:bg-notion-lightBg">
                                            {isPinned ? '取消置頂' : '設為置頂'}
                                        </button>
                                        <div className="h-px bg-notion-border my-1"></div>
                                        <button onClick={(e) => handleMenuClick(e, 'delete')} className="w-full text-left px-4 py-2 text-sm text-notion-red hover:bg-notion-redBg">
                                            刪除公告
                                        </button>
                                    </div>
                                </>
                            )}
                        </div>
                    </div>

                    {/* 中排：標題與內文 */}
                    <div className="mb-3">
                        <h3 className="text-base font-semibold text-notion-text mb-1 leading-snug">
                            {isText ? (data.content || "未命名公告").split('\n')[0].substring(0, 40) : data.title}
                        </h3>
                        <p className="text-sm text-notion-gray line-clamp-2">
                            {isText ? data.content : data.description}
                        </p>
                    </div>

                    {/* 下排：閱讀全文 / 開啟連結 */}
                    <div className="mt-auto">
                        <span className="text-sm font-medium text-notion-gray group-hover:text-notion-text transition-colors">
                            {isText ? '閱讀全文 →' : '開啟連結 ↗'}
                        </span>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 主應用程式 (App)
        // ==========================================
        const App = () => {
            const [selectedDoc, setSelectedDoc] = React.useState(null);
            const [activeFilterTag, setActiveFilterTag] = React.useState('all');
            const [sortOrder, setSortOrder] = React.useState('newest'); 
            
            // 狀態管理：資料庫資料、載入中、錯誤訊息
            const [boardData, setBoardData] = React.useState([]);
            const [isLoading, setIsLoading] = React.useState(true);
            const [errorMsg, setErrorMsg] = React.useState(null);
            
            // 閱讀頁面的專屬選單狀態
            const [isDetailMenuOpen, setIsDetailMenuOpen] = React.useState(false);

            // Modal 狀態
            const [modalConfig, setModalConfig] = React.useState({ isOpen: false, type: null, doc: null });
            const [editInput, setEditInput] = React.useState('');
            const [tagInput, setTagInput] = React.useState('');
            const [currentTags, setCurrentTags] = React.useState([]);
            
            // 從網址獲取群組 ID 與跳轉參數
            const urlParams = new URLSearchParams(window.location.search);
            const groupId = urlParams.get('id');

            React.useEffect(() => {
                if (!groupId) {
                    setErrorMsg("請從 LINE 群組內輸入「#佈告欄」取得專屬連結進入。");
                    setIsLoading(false);
                    return;
                }
                fetchData();
            }, []);

            // 格式化 Supabase 回傳的資料
            const formatSupabaseData = (items) => {
                return items.map(item => {
                    const itemUrl = item.url || "";
                    const isTextMode = itemUrl.includes("view=");
                    
                    // 處理複數標籤 (字串轉陣列)
                    let parsedTags = [];
                    if (item.tag && typeof item.tag === 'string') {
                        parsedTags = item.tag.split(',').map(t => t.trim()).filter(t => t !== '');
                    }

                    // 處理時間顯示，去除 Supabase 可能附加的 T 與時區
                    let displayTime = item.time || "";
                    if (displayTime.includes('T')) {
                        const d = new Date(displayTime);
                        displayTime = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                    } else {
                        displayTime = displayTime.substring(0, 16);
                    }

                    return {
                        id: item.id.toString(), 
                        type: isTextMode ? 'text' : 'link',
                        time: displayTime,
                        url: itemUrl,
                        title: item.title || '',
                        imageUrl: item.image_url || '',
                        content: isTextMode ? item.content : null,
                        description: !isTextMode ? item.content : null,
                        isPinned: item.is_pinned === true || String(item.is_pinned).toLowerCase() === 'true',
                        tags: parsedTags
                    };
                });
            };

            // 光速抓取資料
            const fetchData = async () => {
                try {
                    const response = await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}?source_id=eq.${groupId}&order=id.desc`, {
                        headers: supaHeaders
                    });
                    
                    if (!response.ok) throw new Error("讀取資料失敗");
                    
                    const rawData = await response.json();
                    const formattedData = formatSupabaseData(rawData);
                    setBoardData(formattedData);
                    
                    // 🔥 修復內文頁跳轉 Bug：直接比對網址參數
                    const viewTime = urlParams.get('view');
                    if (viewTime) {
                        const targetDoc = formattedData.find(item => 
                            item.type === 'text' && decodeURIComponent(item.url).includes(viewTime)
                        );
                        if (targetDoc) setSelectedDoc(targetDoc);
                    }
                } catch (err) {
                    setErrorMsg("無法連接至資料庫，請稍後再試。");
                } finally {
                    setIsLoading(false);
                }
            };

            const openModal = (type, doc) => {
                setModalConfig({ isOpen: true, type, doc });
                if (type === 'edit') {
                    setEditInput(doc.type === 'text' ? doc.content : doc.title);
                } else if (type === 'tag') {
                    setCurrentTags(doc.tags || []);
                    setTagInput('');
                }
            };

            const closeModal = () => setModalConfig({ isOpen: false, type: null, doc: null });

            // 儲存 Modal 變更 (樂觀更新 + 同步 Supabase)
            const handleSaveModal = async () => {
                const { type, doc } = modalConfig;
                if (!doc) return;

                const docId = doc.id;

                if (type === 'delete') {
                    setBoardData(prev => prev.filter(item => item.id !== docId));
                    if (selectedDoc && selectedDoc.id === docId) setSelectedDoc(null);
                    closeModal();
                    
                    try {
                        await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}?id=eq.${docId}`, { method: 'DELETE', headers: supaHeaders });
                    } catch(e) { console.error(e); fetchData(); }

                } else if (type === 'edit') {
                    const newContentTitle = editInput;
                    const payload = doc.type === 'text' ? { content: newContentTitle } : { title: newContentTitle };

                    setBoardData(prev => prev.map(item => item.id === docId ? { 
                        ...item, 
                        content: item.type === 'text' ? newContentTitle : item.content,
                        title: item.type === 'link' ? newContentTitle : item.title
                    } : item));
                    
                    if (selectedDoc && selectedDoc.id === docId) {
                        setSelectedDoc(prev => ({ 
                            ...prev, 
                            content: doc.type === 'text' ? newContentTitle : prev.content,
                            title: doc.type === 'link' ? newContentTitle : prev.title
                        }));
                    }
                    closeModal();

                    try {
                        await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}?id=eq.${docId}`, { method: 'PATCH', headers: supaHeaders, body: JSON.stringify(payload) });
                    } catch(e) { console.error(e); fetchData(); }

                } else if (type === 'tag') {
                    const newTagString = currentTags.join(', ');
                    setBoardData(prev => prev.map(item => item.id === docId ? { ...item, tags: currentTags } : item));
                    if (selectedDoc && selectedDoc.id === docId) {
                        setSelectedDoc(prev => ({ ...prev, tags: currentTags }));
                    }
                    closeModal();

                    try {
                        await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}?id=eq.${docId}`, { method: 'PATCH', headers: supaHeaders, body: JSON.stringify({ tag: newTagString }) });
                    } catch(e) { console.error(e); fetchData(); }
                }
            };

            // 列表卡片的快捷操作
            const handleCardAction = async (actionType, doc) => {
                if (actionType === 'pin') {
                    const docId = doc.id;
                    const newStatus = !doc.isPinned;
                    setBoardData(prev => prev.map(item => item.id === docId ? { ...item, isPinned: newStatus } : item));
                    
                    try {
                        await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}?id=eq.${docId}`, { method: 'PATCH', headers: supaHeaders, body: JSON.stringify({ is_pinned: newStatus }) });
                    } catch(e) { console.error(e); fetchData(); }
                } else {
                    openModal(actionType, doc);
                }
            };

            // 內文閱讀頁的操作
            const handleDetailAction = async (actionType) => {
                setIsDetailMenuOpen(false);
                if (actionType === 'pin') {
                    const docId = selectedDoc.id;
                    const newStatus = !selectedDoc.isPinned;
                    setBoardData(prev => prev.map(item => item.id === docId ? { ...item, isPinned: newStatus } : item));
                    setSelectedDoc(prev => ({ ...prev, isPinned: newStatus }));
                    
                    try {
                        await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}?id=eq.${docId}`, { method: 'PATCH', headers: supaHeaders, body: JSON.stringify({ is_pinned: newStatus }) });
                    } catch(e) { console.error(e); fetchData(); }
                } else {
                    openModal(actionType, selectedDoc);
                }
            };

            const handleCardClick = (data) => {
                if (data.type === 'text') {
                    setSelectedDoc(data);
                    window.scrollTo(0, 0);
                } else {
                    openModal('external_link', data);
                }
            };

            const handleAddTag = (e) => {
                if (e.key === 'Enter' && tagInput.trim() !== '') {
                    e.preventDefault();
                    const newTag = tagInput.trim();
                    if (!currentTags.includes(newTag)) {
                        setCurrentTags([...currentTags, newTag]);
                    }
                    setTagInput('');
                }
            };

            const removeTag = (tagToRemove) => {
                setCurrentTags(currentTags.filter(t => t !== tagToRemove));
            };

            const allUniqueTags = React.useMemo(() => {
                const tagsSet = new Set();
                boardData.forEach(d => {
                    if (d.tags) d.tags.forEach(t => tagsSet.add(t));
                });
                return Array.from(tagsSet);
            }, [boardData]);

            const displayData = React.useMemo(() => {
                let filtered = boardData;
                if (activeFilterTag !== 'all') {
                    filtered = boardData.filter(d => d.tags && d.tags.includes(activeFilterTag));
                }
                return [...filtered].sort((a, b) => {
                    if (a.isPinned && !b.isPinned) return -1;
                    if (!a.isPinned && b.isPinned) return 1;
                    const timeA = new Date(a.time.replace(/-/g, '/')).getTime();
                    const timeB = new Date(b.time.replace(/-/g, '/')).getTime();
                    return sortOrder === 'newest' ? timeB - timeA : timeA - timeB; 
                });
            }, [boardData, activeFilterTag, sortOrder]);

            return (
                <div className="min-h-screen pb-20 selection:bg-notion-highlight selection:text-notion-text">
                    <header className="sticky top-0 bg-white/90 backdrop-blur-md border-b border-notion-border z-40">
                        <div className="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
                            <div className="font-semibold flex items-center gap-2 text-notion-text">
                                📚 群組佈告欄
                            </div>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto px-4 py-8">
                        {isLoading ? (
                            <div className="flex flex-col items-center justify-center py-20 text-notion-gray">
                                <div className="loader mb-4"></div>
                                <p>正在載入公告資料...</p>
                            </div>
                        ) : errorMsg ? (
                            <div className="flex flex-col items-center justify-center py-20 text-center animate-fade-in">
                                <div className="text-4xl mb-4">⚠️</div>
                                <h2 className="text-lg font-semibold text-notion-text mb-2">無法顯示佈告欄</h2>
                                <p className="text-notion-gray max-w-sm">{errorMsg}</p>
                            </div>
                        ) : selectedDoc ? (
                            <div className="animate-fade-in bg-white">
                                {/* 閱讀頁頂部選單 */}
                                <div className="flex justify-between items-center mb-6">
                                    <button 
                                        onClick={() => setSelectedDoc(null)}
                                        className="flex items-center text-sm text-notion-gray hover:text-notion-text transition-colors px-2 py-1 -ml-2 rounded hover:bg-notion-lightBg"
                                    >
                                        <Icons.ArrowLeft /> 返回列表
                                    </button>
                                    
                                    <div className="relative">
                                        <button 
                                            onClick={() => setIsDetailMenuOpen(!isDetailMenuOpen)}
                                            className={`p-1 rounded-md transition-colors ${isDetailMenuOpen ? 'bg-gray-200' : 'text-notion-gray hover:bg-gray-200 hover:text-notion-text'}`}
                                        >
                                            <Icons.More />
                                        </button>
                                        
                                        {isDetailMenuOpen && (
                                            <>
                                                <div className="fixed inset-0 z-10" onClick={() => setIsDetailMenuOpen(false)}></div>
                                                <div className="absolute right-0 mt-1 w-32 bg-white rounded-md shadow-dropdown border border-notion-border z-20 overflow-hidden py-1">
                                                    <button onClick={() => handleDetailAction('edit')} className="w-full text-left px-4 py-2 text-sm text-notion-text hover:bg-notion-lightBg">
                                                        編輯內容
                                                    </button>
                                                    <button onClick={() => handleDetailAction('tag')} className="w-full text-left px-4 py-2 text-sm text-notion-text hover:bg-notion-lightBg">
                                                        設定標籤
                                                    </button>
                                                    <button onClick={() => handleDetailAction('pin')} className="w-full text-left px-4 py-2 text-sm text-notion-text hover:bg-notion-lightBg">
                                                        {selectedDoc.isPinned ? '取消置頂' : '設為置頂'}
                                                    </button>
                                                    <div className="h-px bg-notion-border my-1"></div>
                                                    <button onClick={() => handleDetailAction('delete')} className="w-full text-left px-4 py-2 text-sm text-notion-red hover:bg-notion-redBg">
                                                        刪除公告
                                                    </button>
                                                </div>
                                            </>
                                        )}
                                    </div>
                                </div>

                                <div className="mb-6">
                                    <div className="flex items-center gap-2 mb-3 flex-wrap">
                                        {selectedDoc.isPinned && <span className="text-xs font-medium px-1.5 py-0.5 text-notion-yellow border border-notion-yellow rounded bg-yellow-50/50">置頂</span>}
                                        {selectedDoc.tags && selectedDoc.tags.map(tag => (
                                            <span key={tag} className="text-xs px-1.5 py-0.5 bg-notion-lightBg text-notion-gray rounded border border-notion-border">{tag}</span>
                                        ))}
                                    </div>
                                    <h1 className="text-2xl font-bold text-notion-text mb-2">群組文字公告</h1>
                                    <p className="text-sm text-notion-gray">發布於 {selectedDoc.time}</p>
                                </div>

                                <div className="prose max-w-none border-t border-notion-border pt-6">
                                    <p className="text-base text-notion-text leading-relaxed whitespace-pre-wrap">
                                        {formatTextWithLinks(selectedDoc.content)}
                                    </p>
                                </div>
                            </div>
                        ) : (
                            <div className="animate-fade-in">
                                {/* 標籤過濾與排序 */}
                                <div className="flex justify-between items-end border-b border-notion-border mb-4 pb-2">
                                    <div className="flex gap-4 overflow-x-auto scrollbar-hide flex-grow mr-4">
                                        <button 
                                            onClick={() => setActiveFilterTag('all')}
                                            className={`flex-shrink-0 text-sm font-medium pb-1 border-b-2 transition-colors -mb-[9px] ${activeFilterTag === 'all' ? 'border-notion-text text-notion-text' : 'border-transparent text-notion-gray hover:text-notion-text'}`}
                                        >
                                            全部
                                        </button>
                                        {allUniqueTags.map(tag => (
                                            <button 
                                                key={tag}
                                                onClick={() => setActiveFilterTag(tag)}
                                                className={`flex-shrink-0 text-sm font-medium pb-1 border-b-2 transition-colors -mb-[9px] ${activeFilterTag === tag ? 'border-notion-text text-notion-text' : 'border-transparent text-notion-gray hover:text-notion-text'}`}
                                            >
                                                {tag}
                                            </button>
                                        ))}
                                    </div>
                                    
                                    <select 
                                        value={sortOrder}
                                        onChange={(e) => setSortOrder(e.target.value)}
                                        className="text-xs text-notion-gray bg-transparent border-none focus:outline-none cursor-pointer hover:text-notion-text"
                                    >
                                        <option value="newest">最新發布</option>
                                        <option value="oldest">最早發布</option>
                                    </select>
                                </div>
                                
                                <div className="pt-2">
                                    {displayData.length === 0 ? (
                                        <div className="text-center py-10 text-notion-gray text-sm">
                                            {activeFilterTag !== 'all' ? '此標籤下目前無公告' : '目前沒有任何公告'}
                                        </div>
                                    ) : (
                                        displayData.map((item) => (
                                            <AnnouncementCard 
                                                key={item.id} 
                                                data={item} 
                                                onClick={handleCardClick}
                                                onAction={handleCardAction}
                                            />
                                        ))
                                    )}
                                </div>
                            </div>
                        )}
                    </main>

                    {/* 自訂內建 Modal */}
                    {modalConfig.isOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 animate-fade-in">
                            <div className="bg-white rounded-lg shadow-modal w-full max-w-md overflow-hidden animate-slide-up">
                                
                                <div className="px-5 py-4 border-b border-notion-border flex justify-between items-center bg-notion-lightBg/50">
                                    <h3 className="text-base font-semibold text-notion-text">
                                        {modalConfig.type === 'edit' && '編輯公告'}
                                        {modalConfig.type === 'tag' && '設定標籤'}
                                        {modalConfig.type === 'delete' && '確認刪除'}
                                        {modalConfig.type === 'external_link' && '外部連結'}
                                    </h3>
                                    <button onClick={closeModal} className="text-notion-gray hover:text-notion-text p-1 rounded hover:bg-gray-200 transition-colors">
                                        <Icons.Close />
                                    </button>
                                </div>

                                <div className="p-5">
                                    {modalConfig.type === 'delete' && (
                                        <p className="text-sm text-notion-text mb-2">確定要刪除這篇公告嗎？此動作無法復原。</p>
                                    )}

                                    {modalConfig.type === 'external_link' && (
                                        <div>
                                            <p className="text-sm text-notion-gray mb-4">即將前往外部網站：</p>
                                            <a href={modalConfig.doc.url} target="_blank" rel="noopener noreferrer" className="text-sm text-notion-link break-all hover:underline block p-3 bg-notion-lightBg rounded border border-notion-border">
                                                {modalConfig.doc.url}
                                            </a>
                                        </div>
                                    )}

                                    {modalConfig.type === 'edit' && (
                                        <div>
                                            {modalConfig.doc.type === 'text' ? (
                                                <textarea 
                                                    value={editInput}
                                                    onChange={(e) => setEditInput(e.target.value)}
                                                    rows="6"
                                                    className="w-full text-sm p-3 border border-notion-border rounded bg-notion-lightBg focus:bg-white focus:outline-none focus:border-gray-400 resize-y"
                                                    placeholder="輸入內容..."
                                                />
                                            ) : (
                                                <input 
                                                    type="text" 
                                                    value={editInput}
                                                    onChange={(e) => setEditInput(e.target.value)}
                                                    className="w-full text-sm p-3 border border-notion-border rounded bg-notion-lightBg focus:bg-white focus:outline-none focus:border-gray-400"
                                                    placeholder="輸入標題..."
                                                />
                                            )}
                                        </div>
                                    )}

                                    {modalConfig.type === 'tag' && (
                                        <div>
                                            <p className="text-xs text-notion-gray mb-2">已加入的標籤：</p>
                                            <div className="flex flex-wrap gap-2 mb-4 p-3 border border-notion-border rounded bg-notion-lightBg min-h-[42px]">
                                                {currentTags.length === 0 && <span className="text-sm text-notion-gray">目前無標籤</span>}
                                                {currentTags.map(tag => (
                                                    <span key={tag} className="flex items-center gap-1 text-sm bg-white border border-notion-border px-2 py-0.5 rounded">
                                                        {tag}
                                                        <button onClick={() => removeTag(tag)} className="text-notion-gray hover:text-notion-red">
                                                            <Icons.Close />
                                                        </button>
                                                    </span>
                                                ))}
                                            </div>
                                            <p className="text-xs text-notion-gray mb-1">新增標籤 (輸入後按 Enter)</p>
                                            <input 
                                                type="text" 
                                                value={tagInput}
                                                onChange={(e) => setTagInput(e.target.value)}
                                                onKeyDown={handleAddTag}
                                                placeholder="例如：會議、急件..."
                                                className="w-full text-sm p-2 border border-notion-border rounded focus:outline-none focus:border-gray-400"
                                                maxLength={15}
                                            />
                                        </div>
                                    )}
                                </div>

                                <div className="px-5 py-3 border-t border-notion-border bg-notion-lightBg/30 flex justify-end gap-2">
                                    <button onClick={closeModal} className="px-4 py-1.5 text-sm font-medium text-notion-text bg-white border border-notion-border rounded hover:bg-gray-50 transition-colors">
                                        取消
                                    </button>
                                    {modalConfig.type === 'delete' ? (
                                        <button onClick={handleSaveModal} className="px-4 py-1.5 text-sm font-medium text-white bg-notion-red rounded hover:bg-red-600 transition-colors">
                                            確認刪除
                                        </button>
                                    ) : modalConfig.type === 'external_link' ? (
                                        <button onClick={closeModal} className="px-4 py-1.5 text-sm font-medium text-white bg-notion-text rounded hover:bg-gray-800 transition-colors">
                                            我知道了
                                        </button>
                                    ) : (
                                        <button onClick={handleSaveModal} className="px-4 py-1.5 text-sm font-medium text-white bg-notion-text rounded hover:bg-gray-800 transition-colors">
                                            儲存
                                        </button>
                                    )}
                                </div>

                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
