<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>佈告欄</title>
    <!-- 引入 React 與 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- 引入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        notion: {
                            text: '#37352f',
                            gray: '#787774',
                            lightBg: '#f7f7f5',
                            border: '#e9e9e7',
                            link: '#065fd4',
                            highlight: '#fdf3c0' // 置頂高亮色
                        }
                    },
                    fontFamily: {
                        sans: ['-apple-system', 'BlinkMacSystemFont', '"Segoe UI"', 'Roboto', 'Helvetica', 'Arial', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #ffffff; color: #37352f; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d3d1cb; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #aeaca6; }
        /* 載入動畫 */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #d3d1cb;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // 1. 小工具：自動將文字中的網址轉成超連結
        // ==========================================
        const formatTextWithLinks = (text) => {
            if (!text) return null;
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const parts = text.split(urlRegex);

            return parts.map((part, index) => {
                if (part.match(urlRegex)) {
                    return (
                        <a 
                            key={index} 
                            href={part} 
                            target="_blank" 
                            rel="noopener noreferrer" 
                            className="text-notion-link hover:underline break-all"
                            onClick={(e) => e.stopPropagation()} 
                        >
                            {part}
                        </a>
                    );
                }
                return <span key={index}>{part.split('\n').map((line, i) => (
                    <React.Fragment key={i}>
                        {line}
                        {i !== part.split('\n').length - 1 && <br />}
                    </React.Fragment>
                ))}</span>;
            });
        };

        // ==========================================
        // 2. React 元件：單張佈告欄卡片
        // ==========================================
        const AnnouncementCard = ({ data, onClick, onTogglePin, onEditTag, onEdit, onDelete }) => {
            const isText = data.type === 'text';
            const shortDate = data.time.substring(0, 10);
            const isPinned = data.isPinned === true || data.isPinned === "true" || data.isPinned === "置頂";

            return (
                <div 
                    onClick={() => onClick(data)}
                    className={`group flex flex-col sm:flex-row items-start gap-4 p-4 mb-3 border rounded-lg cursor-pointer transition-colors duration-200 relative
                        ${isPinned ? 'bg-notion-highlight/30 border-yellow-200 hover:bg-notion-highlight/50' : 'bg-white border-notion-border hover:bg-notion-lightBg'}`}
                >
                    <div className="flex-shrink-0 w-14 h-14 sm:w-20 sm:h-20 rounded-md overflow-hidden bg-gray-100 flex items-center justify-center border border-gray-100 relative">
                        {isText ? (
                            <span className="text-2xl sm:text-3xl">📄</span>
                        ) : (
                            <img src={data.imageUrl} alt="cover" className="w-full h-full object-cover" />
                        )}
                        {isPinned && (
                            <div className="absolute top-0 left-0 bg-red-500 text-white text-[10px] px-1.5 py-0.5 rounded-br-md font-bold z-10">
                                置頂
                            </div>
                        )}
                    </div>

                    <div className="flex-grow min-w-0 flex flex-col justify-center min-h-[3.5rem] sm:min-h-[5rem] w-full">
                        <div className="flex justify-between items-start mb-1 gap-2">
                            <h3 className="text-sm sm:text-base font-semibold text-notion-text leading-tight truncate flex items-center gap-1.5">
                                {isPinned && <span className="text-red-500 text-xs flex-shrink-0">📌</span>}
                                {isText ? (data.content && data.content.length > 30 ? data.content.substring(0, 30) + "..." : data.content || "📝 文字公告") : data.title}
                            </h3>
                            
                            {/* 操作按鈕區 */}
                            <div className="flex items-center gap-1 opacity-100 sm:opacity-0 group-hover:opacity-100 transition-opacity flex-shrink-0 flex-wrap justify-end">
                                <button 
                                    onClick={(e) => { e.stopPropagation(); onEdit(data); }}
                                    className="p-1.5 text-xs bg-blue-50 hover:bg-blue-100 text-blue-600 rounded flex items-center gap-1"
                                    title="編輯"
                                >
                                    ✏️ 編輯
                                </button>
                                <button 
                                    onClick={(e) => { e.stopPropagation(); onDelete(data); }}
                                    className="p-1.5 text-xs bg-red-50 hover:bg-red-100 text-red-600 rounded flex items-center gap-1"
                                    title="刪除"
                                >
                                    🗑️ 刪除
                                </button>
                                <button 
                                    onClick={(e) => { e.stopPropagation(); onEditTag(data); }}
                                    className="p-1.5 text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 rounded flex items-center gap-1"
                                    title="設定標籤"
                                >
                                    🏷️ 標籤
                                </button>
                                <button 
                                    onClick={(e) => { e.stopPropagation(); onTogglePin(data.id, data.isPinned); }}
                                    className={`p-1.5 text-xs rounded flex items-center gap-1 ${isPinned ? 'bg-yellow-100 hover:bg-yellow-200 text-yellow-700' : 'bg-gray-100 hover:bg-gray-200 text-gray-600'}`}
                                >
                                    {isPinned ? '取消置頂' : '📌 置頂'}
                                </button>
                            </div>
                        </div>
                        
                        {!isText && (
                            <p className="text-xs sm:text-sm text-notion-gray truncate mb-1.5">
                                {data.description}
                            </p>
                        )}
                        
                        <div className="flex flex-wrap items-center justify-between mt-auto gap-2">
                            <div className="flex items-center gap-2">
                                <span className="text-xs text-notion-gray">{shortDate}</span>
                                {data.tag && (
                                    <span className="text-[10px] px-2 py-0.5 rounded-md bg-blue-50 text-blue-600 border border-blue-100">
                                        {data.tag}
                                    </span>
                                )}
                            </div>
                            <span className={`text-[10px] px-2 py-0.5 rounded-full font-medium ${isPinned ? 'bg-yellow-100 text-yellow-800' : 'bg-gray-100 text-notion-gray'}`}>
                                {isText ? '完整查看 →' : '外部連結 ↗'}
                            </span>
                        </div>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 3. React 元件：文字公告詳細頁面
        // ==========================================
        const TextDetailView = ({ data, onBack }) => {
            return (
                <div className="animate-fade-in">
                    <button 
                        onClick={onBack}
                        className="mb-6 flex items-center text-sm text-notion-gray hover:text-notion-text transition-colors"
                    >
                        <svg className="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                        返回佈告欄
                    </button>

                    <div className="mb-8">
                        <div className="flex items-center gap-2 mb-2 flex-wrap">
                            {data.isPinned && <span className="text-2xl bg-red-100 text-red-500 px-2 py-1 rounded-md text-sm font-bold">📌 置頂</span>}
                            {data.tag && <span className="bg-blue-100 text-blue-700 px-2 py-1 rounded-md text-sm font-medium">{data.tag}</span>}
                            <h1 className="text-2xl font-bold text-notion-text w-full sm:w-auto mt-2 sm:mt-0">群組文字公告</h1>
                        </div>
                        <div className="text-sm text-notion-gray">
                            發布時間：{data.time}
                        </div>
                    </div>

                    <div className="prose max-w-none bg-notion-lightBg p-6 rounded-lg border border-notion-border">
                        <p className="text-base sm:text-lg text-notion-text leading-relaxed whitespace-pre-wrap">
                            {formatTextWithLinks(data.content)}
                        </p>
                    </div>
                </div>
            );
        };

        // ==========================================
        // 4. 主應用程式 (App)
        // ==========================================
        const App = () => {
            const [selectedDoc, setSelectedDoc] = React.useState(null);
            const [sortOrder, setSortOrder] = React.useState('newest');
            const [activeFilterTag, setActiveFilterTag] = React.useState('all');
            
            // 狀態管理：資料、載入中、錯誤訊息
            const [boardData, setBoardData] = React.useState([]);
            const [isLoading, setIsLoading] = React.useState(true);
            const [errorMsg, setErrorMsg] = React.useState(null);
            
            // 標籤 Modal 狀態
            const [isTagModalOpen, setIsTagModalOpen] = React.useState(false);
            const [editingDoc, setEditingDoc] = React.useState(null);
            const [newTagInput, setNewTagInput] = React.useState('');

            // 新增：編輯與刪除 Modal 狀態
            const [isEditModalOpen, setIsEditModalOpen] = React.useState(false);
            const [editContentInput, setEditContentInput] = React.useState('');
            const [editTitleInput, setEditTitleInput] = React.useState('');

            const [isDeleteModalOpen, setIsDeleteModalOpen] = React.useState(false);
            const [deleteTarget, setDeleteTarget] = React.useState(null);

            // 🔥 你的 GAS 網址 (請確認網址正確)
            const GAS_API_URL = "https://script.google.com/macros/s/AKfycby2nkvL2v7UcsyI9V_VruK_Uj7FN4s4R4lvCExxh9uaTrgJESH49ONY20PtxPUjdrYATg/exec";
            
            // 從網址獲取群組 ID
            const urlParams = new URLSearchParams(window.location.search);
            const groupId = urlParams.get('id');

            React.useEffect(() => {
                const viewTime = urlParams.get('view');

                if (!groupId) {
                    setErrorMsg("請從 LINE 群組內輸入「#佈告欄」取得專屬連結進入。");
                    setIsLoading(false);
                    return;
                }

                fetchData();
            }, []);

            // 抓取資料函數
            const fetchData = async () => {
                try {
                    const response = await fetch(`${GAS_API_URL}?id=${groupId}`);
                    const data = await response.json();
                    
                    if (data.error) {
                        setErrorMsg(data.error);
                    } else {
                        setBoardData(data);
                        
                        // 處理自動開啟特定貼文
                        const viewTime = urlParams.get('view');
                        if (viewTime) {
                            const targetDoc = data.find(item => item.time === decodeURIComponent(viewTime) && item.type === 'text');
                            if (targetDoc) setSelectedDoc(targetDoc);
                        }
                    }
                } catch (err) {
                    setErrorMsg("無法連接至資料庫，請稍後再試。");
                } finally {
                    setIsLoading(false);
                }
            };

            // 處理置頂切換
            const handleTogglePin = async (docId, currentPinned) => {
                // 樂觀更新 (先改 UI 讓使用者覺得很快)
                setBoardData(prev => prev.map(item => item.id === docId ? { ...item, isPinned: !currentPinned } : item));
                
                try {
                    await fetch(`${GAS_API_URL}?id=${groupId}&action=togglePin&rowId=${docId}`);
                } catch (e) {
                    console.error("置頂更新失敗", e);
                    // 失敗則還原
                    setBoardData(prev => prev.map(item => item.id === docId ? { ...item, isPinned: currentPinned } : item));
                    alert("更新失敗，請檢查網路連線");
                }
            };

            // 處理標籤更新
            const handleUpdateTag = async () => {
                if (!editingDoc) return;
                
                const docId = editingDoc.id;
                const tagToSave = newTagInput.trim();
                
                // 樂觀更新
                setBoardData(prev => prev.map(item => item.id === docId ? { ...item, tag: tagToSave } : item));
                setIsTagModalOpen(false);
                
                try {
                    await fetch(`${GAS_API_URL}?id=${groupId}&action=updateTag&rowId=${docId}&tag=${encodeURIComponent(tagToSave)}`);
                } catch (e) {
                    console.error("標籤更新失敗", e);
                    fetchData(); // 失敗則重新抓取還原
                    alert("標籤更新失敗");
                }
            };

            // 開啟標籤編輯器
            const openTagModal = (doc) => {
                setEditingDoc(doc);
                setNewTagInput(doc.tag || '');
                setIsTagModalOpen(true);
            };

            // 新增：開啟編輯內容
            const openEditModal = (doc) => {
                setEditingDoc(doc);
                setEditContentInput(doc.content || '');
                setEditTitleInput(doc.title || '');
                setIsEditModalOpen(true);
            };

            // 新增：儲存編輯變更
            const handleUpdateContent = async () => {
                if (!editingDoc) return;
                
                const docId = editingDoc.id;
                const newContent = editContentInput.trim();
                const newTitle = editTitleInput.trim();
                const type = editingDoc.type;
                
                // 樂觀更新
                setBoardData(prev => prev.map(item => item.id === docId ? { 
                    ...item, 
                    content: type === 'text' ? newContent : item.content,
                    title: type === 'link' ? newTitle : item.title
                } : item));
                setIsEditModalOpen(false);
                
                // 同步更新當前查看的文件（如果在詳細頁面中）
                if (selectedDoc && selectedDoc.id === docId) {
                    setSelectedDoc(prev => ({
                        ...prev,
                        content: type === 'text' ? newContent : prev.content,
                        title: type === 'link' ? newTitle : prev.title
                    }));
                }
                
                try {
                    await fetch(`${GAS_API_URL}?id=${groupId}&action=updateContent&rowId=${docId}&content=${encodeURIComponent(newContent)}&title=${encodeURIComponent(newTitle)}&type=${type}`);
                } catch (e) {
                    console.error("編輯失敗", e);
                    fetchData();
                }
            };

            // 新增：開啟刪除確認
            const openDeleteModal = (doc) => {
                setDeleteTarget(doc);
                setIsDeleteModalOpen(true);
            };

            // 新增：確認刪除
            const handleDelete = async () => {
                if (!deleteTarget) return;
                
                const docId = deleteTarget.id;
                
                // 樂觀更新
                setBoardData(prev => prev.filter(item => item.id !== docId));
                setIsDeleteModalOpen(false);
                
                // 如果刪除的是當前正在查看的文字公告，則退回列表
                if (selectedDoc && selectedDoc.id === docId) {
                    setSelectedDoc(null);
                }
                
                try {
                    await fetch(`${GAS_API_URL}?id=${groupId}&action=delete&rowId=${docId}`);
                } catch (e) {
                    console.error("刪除失敗", e);
                    fetchData();
                }
            };

            // 點擊卡片
            const handleCardClick = (data) => {
                if (data.type === 'text') {
                    setSelectedDoc(data);
                    window.scrollTo(0, 0);
                } else {
                    window.open(data.url, '_blank');
                }
            };

            // 獲取所有現有標籤 (供 Modal 快速選擇與上方篩選用)
            const allUniqueTags = React.useMemo(() => {
                const tags = boardData.map(d => d.tag).filter(t => t && t.trim() !== '');
                return [...new Set(tags)];
            }, [boardData]);

            // 資料排序與篩選
            const displayData = React.useMemo(() => {
                let filtered = boardData;
                
                if (activeFilterTag !== 'all') {
                    filtered = boardData.filter(d => d.tag === activeFilterTag);
                }

                return [...filtered].sort((a, b) => {
                    if (a.isPinned && !b.isPinned) return -1;
                    if (!a.isPinned && b.isPinned) return 1;

                    const timeA = new Date(a.time.replace(/-/g, '/')).getTime();
                    const timeB = new Date(b.time.replace(/-/g, '/')).getTime();
                    
                    return sortOrder === 'newest' ? timeB - timeA : timeA - timeB;
                });
            }, [boardData, sortOrder, activeFilterTag]);

            // ================= 畫面渲染 =================
            return (
                <div className="min-h-screen font-sans pb-10">
                    <header className="sticky top-0 bg-white/80 backdrop-blur-md border-b border-notion-border z-30">
                        <div className="max-w-2xl mx-auto px-4 h-14 flex items-center justify-between">
                            <div className="font-semibold flex items-center gap-2 text-notion-text">
                                <span className="text-xl">📚</span>
                                佈告欄
                            </div>
                        </div>
                    </header>

                    <main className="max-w-2xl mx-auto px-4 py-8">
                        {/* 狀態 1：載入中 */}
                        {isLoading && (
                            <div className="flex flex-col items-center justify-center py-20 text-notion-gray">
                                <div className="loader mb-4"></div>
                                <p>正在載入公告資料...</p>
                            </div>
                        )}

                        {/* 狀態 2：錯誤或缺乏參數 */}
                        {!isLoading && errorMsg && (
                            <div className="flex flex-col items-center justify-center py-20 text-center animate-fade-in">
                                <div className="text-4xl mb-4">⚠️</div>
                                <h2 className="text-lg font-semibold text-notion-text mb-2">無法顯示佈告欄</h2>
                                <p className="text-notion-gray max-w-sm">{errorMsg}</p>
                            </div>
                        )}

                        {/* 狀態 3：正常顯示 */}
                        {!isLoading && !errorMsg && (
                            selectedDoc ? (
                                <TextDetailView 
                                    data={selectedDoc} 
                                    onBack={() => setSelectedDoc(null)} 
                                />
                            ) : (
                                <div className="animate-fade-in">
                                    <div className="mb-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                        <div className="flex items-center gap-2">
                                            <h2 className="text-lg font-semibold text-notion-text">全部公告</h2>
                                            <span className="text-xs text-notion-gray bg-notion-lightBg border border-notion-border px-2 py-0.5 rounded-full">共 {boardData.length} 筆</span>
                                        </div>
                                        
                                        <div className="flex items-center gap-1.5 text-sm text-notion-gray bg-white border border-notion-border px-2.5 py-1.5 rounded-md shadow-sm">
                                            <svg className="w-4 h-4 text-notion-gray" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12"></path></svg>
                                            <select 
                                                value={sortOrder}
                                                onChange={(e) => setSortOrder(e.target.value)}
                                                className="bg-transparent border-none outline-none cursor-pointer hover:text-notion-text focus:ring-0 p-0"
                                            >
                                                <option value="newest">最新發布</option>
                                                <option value="oldest">最早發布</option>
                                            </select>
                                        </div>
                                    </div>

                                    {/* 標籤篩選列 */}
                                    {allUniqueTags.length > 0 && (
                                        <div className="flex gap-2 overflow-x-auto pb-4 mb-2 scrollbar-hide">
                                            <button 
                                                onClick={() => setActiveFilterTag('all')}
                                                className={`flex-shrink-0 px-3 py-1.5 rounded-full text-sm transition-colors ${activeFilterTag === 'all' ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}
                                            >
                                                全部
                                            </button>
                                            {allUniqueTags.map(tag => (
                                                <button 
                                                    key={tag}
                                                    onClick={() => setActiveFilterTag(tag)}
                                                    className={`flex-shrink-0 px-3 py-1.5 rounded-full text-sm transition-colors ${activeFilterTag === tag ? 'bg-blue-600 text-white' : 'bg-blue-50 text-blue-600 border border-blue-100 hover:bg-blue-100'}`}
                                                >
                                                    {tag}
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                    
                                    <div>
                                        {displayData.length === 0 ? (
                                            <div className="text-center py-10 text-notion-gray border border-dashed border-notion-border rounded-lg mt-4">
                                                {activeFilterTag !== 'all' ? '此標籤目前無公告' : '本群組目前尚無公告'}
                                            </div>
                                        ) : (
                                            displayData.map((item) => (
                                                <AnnouncementCard 
                                                    key={item.id} 
                                                    data={item} 
                                                    onClick={handleCardClick}
                                                    onTogglePin={handleTogglePin}
                                                    onEditTag={openTagModal}
                                                    onEdit={openEditModal}
                                                    onDelete={openDeleteModal}
                                                />
                                            ))
                                        )}
                                    </div>
                                </div>
                            )
                        )}
                    </main>

                    {/* 標籤編輯彈跳視窗 Modal */}
                    {isTagModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm animate-fade-in" onClick={() => setIsTagModalOpen(false)}>
                            <div className="bg-white rounded-xl shadow-xl w-full max-w-sm p-6" onClick={e => e.stopPropagation()}>
                                <h3 className="text-lg font-bold text-gray-900 mb-4">設定標籤</h3>
                                
                                <div className="mb-4">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">輸入新標籤名稱</label>
                                    <input 
                                        type="text" 
                                        value={newTagInput}
                                        onChange={(e) => setNewTagInput(e.target.value)}
                                        placeholder="例如：賽事、訓練、聚餐..."
                                        className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                        maxLength={10}
                                    />
                                </div>

                                {allUniqueTags.length > 0 && (
                                    <div className="mb-6">
                                        <label className="block text-sm text-gray-500 mb-2">或從現有標籤中選擇：</label>
                                        <div className="flex flex-wrap gap-2">
                                            {allUniqueTags.map(tag => (
                                                <button
                                                    key={tag}
                                                    onClick={() => setNewTagInput(tag)}
                                                    className={`px-2.5 py-1 rounded border text-sm ${newTagInput === tag ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-gray-50 border-gray-200 text-gray-600 hover:bg-gray-100'}`}
                                                >
                                                    {tag}
                                                </button>
                                            ))}
                                            <button 
                                                onClick={() => setNewTagInput('')}
                                                className="px-2.5 py-1 rounded border border-gray-200 bg-gray-50 text-gray-500 hover:bg-red-50 hover:text-red-500 text-sm"
                                            >
                                                清除標籤
                                            </button>
                                        </div>
                                    </div>
                                )}

                                <div className="flex justify-end gap-3 mt-6">
                                    <button 
                                        onClick={() => setIsTagModalOpen(false)}
                                        className="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50"
                                    >
                                        取消
                                    </button>
                                    <button 
                                        onClick={handleUpdateTag}
                                        className="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700"
                                    >
                                        儲存標籤
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 新增：編輯內容 Modal */}
                    {isEditModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm animate-fade-in" onClick={() => setIsEditModalOpen(false)}>
                            <div className="bg-white rounded-xl shadow-xl w-full max-w-lg p-6" onClick={e => e.stopPropagation()}>
                                <h3 className="text-lg font-bold text-gray-900 mb-4">
                                    {editingDoc?.type === 'text' ? '編輯文字公告' : '編輯連結標題'}
                                </h3>
                                
                                <div className="mb-4">
                                    {editingDoc?.type === 'text' ? (
                                        <textarea 
                                            value={editContentInput}
                                            onChange={(e) => setEditContentInput(e.target.value)}
                                            rows="8"
                                            className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 resize-y"
                                            placeholder="請輸入公告內容..."
                                        />
                                    ) : (
                                        <input 
                                            type="text" 
                                            value={editTitleInput}
                                            onChange={(e) => setEditTitleInput(e.target.value)}
                                            className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                                            placeholder="請輸入標題..."
                                        />
                                    )}
                                </div>

                                <div className="flex justify-end gap-3 mt-6">
                                    <button 
                                        onClick={() => setIsEditModalOpen(false)}
                                        className="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50"
                                    >
                                        取消
                                    </button>
                                    <button 
                                        onClick={handleUpdateContent}
                                        className="px-4 py-2 text-sm font-medium text-white bg-blue-600 rounded-md hover:bg-blue-700"
                                    >
                                        儲存變更
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 新增：刪除確認 Modal */}
                    {isDeleteModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm animate-fade-in" onClick={() => setIsDeleteModalOpen(false)}>
                            <div className="bg-white rounded-xl shadow-xl w-full max-w-sm p-6" onClick={e => e.stopPropagation()}>
                                <div className="flex items-center gap-3 mb-4 text-red-600">
                                    <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                    <h3 className="text-lg font-bold text-gray-900">確認刪除</h3>
                                </div>
                                <p className="text-sm text-gray-600 mb-6">
                                    您確定要刪除這篇公告嗎？此動作無法復原。
                                </p>
                                <div className="flex justify-end gap-3">
                                    <button 
                                        onClick={() => setIsDeleteModalOpen(false)}
                                        className="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50"
                                    >
                                        取消
                                    </button>
                                    <button 
                                        onClick={handleDelete}
                                        className="px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-md hover:bg-red-700"
                                    >
                                        確認刪除
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
